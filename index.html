<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário, Meu Amor! 💙</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            font-family: 'Poppins', sans-serif;
            text-align: center;
            overflow: hidden; /* Evita scroll indesejado */
        }
        
        /* === ECRÃ DE BOAS VINDAS === */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Fica por cima de tudo */
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .welcome-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .welcome-screen h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 4em;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            padding: 0 20px;
        }

        .start-btn {
            background-color: #fff;
            color: #ff6b81;
            border: none;
            padding: 15px 35px;
            font-size: 1.2em;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        /* === CARTÃO PRINCIPAL === */
        .cartao {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            transition: transform 0.3s ease;
            position: relative; 
            z-index: 10;
        }

        .cartao:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff6b81;
            font-size: 3em;
            margin-bottom: 10px;
        }

        p.intro {
            color: #555;
            line-height: 1.6;
            font-size: 1.1em;
        }

        .foto {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid #ffceea;
            margin: 20px 0;
        }

        .botao {
            display: inline-block;
            background-color: #ff6b81;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 600;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }

        .botao:hover {
            background-color: #ff4760;
        }

        /* === PLAYER DE MÚSICA === */
        .music-wrap {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff0f5;
            border: 1.5px solid #ffb6c1;
            border-radius: 40px;
            padding: 8px 16px 8px 8px;
            box-shadow: 0 4px 15px rgba(255,105,150,0.2);
            z-index: 100;
        }
        .music-btn2 {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #ffb6c1;
            border: none;
            cursor: pointer;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background 0.3s ease;
            flex-shrink: 0;
        }
        .music-btn2:hover { background: #ff85a1; transform: scale(1.1); }
        .music-btn2.playing { animation: pulse 1.2s ease infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        .vol-icon { font-size: 0.85em; color: #d63f7a; }
        input[type=range].vol-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            border-radius: 4px;
            background: #ffceea;
            outline: none;
            cursor: pointer;
        }
        input[type=range].vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #d63f7a;
            cursor: pointer;
        }
        input[type=range].vol-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #d63f7a;
            border: none;
            cursor: pointer;
        }
        .vol-pct { font-size: 0.75em; color: #b07090; min-width: 28px; text-align: right; }

        /* === PANDAS === */
        .panda-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            overflow: hidden;
            z-index: 1;
        }

        .panda {
            position: absolute;
            bottom: -150px; 
            width: 100px;  
            height: 100px;
            background-image: url('pandinhasSheet.png');
            background-size: 800px 400px; 
            background-repeat: no-repeat;
            opacity: 0.8;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        .pose1 { background-position: 0 0; animation: spriteAnim 0.8s steps(8) infinite, flutuarSubida 15s linear infinite; }
        .pose2 { background-position: 0 -100px; animation: spriteAnim 1.2s steps(8) infinite, flutuarSubida 12s linear infinite; animation-delay: 2s; }
        .pose3 { background-position: 0 -200px; animation: spriteAnim 1s steps(8) infinite, flutuarSubida 18s linear infinite; animation-delay: 4s; }
        .pose4 { background-position: 0 -300px; animation: spriteAnim 0.9s steps(8) infinite, flutuarSubida 14s linear infinite; animation-delay: 1s; }

        .panda:nth-child(1) { left: 5%;  transform: scale(0.8); }
        .panda:nth-child(2) { left: 25%; transform: scale(1.2); }
        .panda:nth-child(3) { left: 45%; transform: scale(1.0); }
        .panda:nth-child(4) { left: 65%; transform: scale(0.9); }
        .panda:nth-child(5) { left: 80%; transform: scale(1.1); }
        .panda:nth-child(6) { left: 92%; transform: scale(0.7); }

        @keyframes spriteAnim {
            from { background-position-x: 0; }
            to { background-position-x: -800px; } 
        }

        @keyframes flutuarSubida {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-120vh) rotate(15deg); }
        }
    </style>
</head>
<body>

    <div id="welcome-screen" class="welcome-screen">
        <h2>Feliz Aniversário Momor🎂💙</h2>
        <button id="start-btn" class="start-btn">Abrir a minha surpresa</button>
    </div>

    <div class="cartao">
        <h1>Feliz Aniversário!</h1>
        
        <img src="vossa-foto.png" alt="Uma foto nossa especial" class="foto">
        
        <p class="intro">"Entre risos, aventuras e amor… escolher-te continua a ser a minha parte favorita.
                          Obrigado por fazeres os meus dias mais felizes. Amo-te 💙"</p>
        
        <a href="carta.html" class="botao">Clica para uma Surpresa</a>
    </div>

    <div class="panda-container">
        <div class="panda pose1"></div>
        <div class="panda pose2"></div>
        <div class="panda pose3"></div>
        <div class="panda pose4"></div>
        <div class="panda pose1"></div>
        <div class="panda pose3"></div>
    </div>

    <div class="music-wrap">
        <button class="music-btn2" id="musicBtn">🎵</button>
        <div style="display:flex; align-items:center; gap:6px;">
            <span class="vol-icon">🔈</span>
            <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="70" step="1">
            <span class="vol-pct" id="volPct">70%</span>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        const welcomeScreen = document.getElementById('welcome-screen');
        const startBtn = document.getElementById('start-btn');
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        const volSlider = document.getElementById('volSlider');
        const volPct = document.getElementById('volPct');
        let playing = false;

        bgMusic.volume = 0.7;

        // Lógica de arranque no clique do botão da surpresa
        startBtn.addEventListener('click', () => {
            // Esconde o ecrã inicial com fade out
            welcomeScreen.classList.add('hidden');
            
            // Inicia a música
            bgMusic.play().then(() => {
                playing = true;
                musicBtn.textContent = '🔇';
                musicBtn.classList.add('playing');
            }).catch((err) => {
                console.log("Erro ao reproduzir áudio:", err);
            });
        });

        // Botão para pausar/retomar no canto inferior
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (playing) {
                bgMusic.pause();
                musicBtn.textContent = '🎵';
                musicBtn.classList.remove('playing');
            } else {
                bgMusic.play().catch(() => {});
                musicBtn.textContent = '🔇';
                musicBtn.classList.add('playing');
            }
            playing = !playing;
        });

        // Controlo de volume
        volSlider.addEventListener('input', () => {
            bgMusic.volume = volSlider.value / 100;
            volPct.textContent = volSlider.value + '%';
        });
    </script>

</body>
</html>
